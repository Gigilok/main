name: Build nRF-BOX Pro Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-platformio-
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
        
    - name: Build firmware
      run: |
        pio run --environment esp32dev
        
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: nrf-box-pro-firmware
        path: |
          .pio/build/esp32dev/firmware.bin
          .pio/build/esp32dev/firmware.elf
          .pio/build/esp32dev/partitions.bin
          .pio/build/esp32dev/bootloader.bin
        retention-days: 30
        
    - name: Create release package
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      run: |
        mkdir -p release
        cp .pio/build/esp32dev/firmware.bin release/
        cp .pio/build/esp32dev/partitions.bin release/
        cp .pio/build/esp32dev/bootloader.bin release/
        echo "nRF-BOX Pro Firmware" > release/README.txt
        echo "Version: ${{ github.ref_name }}" >> release/README.txt
        echo "Date: $(date)" >> release/README.txt
        echo "" >> release/README.txt
        echo "Flash command:" >> release/README.txt
        echo "esptool.py --chip esp32 --baud 921600 write_flash 0x1000 bootloader.bin 0x8000 partitions.bin 0x10000 firmware.bin" >> release/README.txt
        
    - name: Upload release assets
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/firmware.bin
          release/partitions.bin
          release/bootloader.bin
          release/README.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
