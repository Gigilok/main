name: Build Firmware

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar Python e PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Compilar Projeto
        run: platformio run

      - name: Organizar Binários
        run: |
          mkdir -p binarios_para_flash
          # Copia os arquivos gerados pelo PlatformIO para uma pasta separada
          cp .pio/build/esp32dev/firmware.bin binarios_para_flash/
          cp .pio/build/esp32dev/bootloader.bin binarios_para_flash/
          cp .pio/build/esp32dev/partitions.bin binarios_para_flash/
          cp .pio/build/esp32dev/boot_app0.bin binarios_para_flash/

      - name: Upload dos Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: Firmware_ESP32
          path: binarios_para_flash/
          
