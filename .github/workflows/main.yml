name: Build MadCat OS v2.0 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-platformio-
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
        
    - name: Build firmware
      run: pio run --environment esp32dev
        
    - name: Copy boot_app0.bin
      run: |
        mkdir -p .pio/build/esp32dev
        find ~/.platformio -name "boot_app0.bin" -exec cp {} .pio/build/esp32dev/ \;
        ls -la .pio/build/esp32dev/boot_app0.bin
        
    - name: List build files
      run: |
        echo "=== Arquivos gerados ==="
        ls -la .pio/build/esp32dev/
        echo ""
        echo "=== Enderecos de flash ==="
        echo "0x1000  - bootloader.bin"
        echo "0x8000  - partitions.bin"
        echo "0xE000  - boot_app0.bin"
        echo "0x10000 - firmware.bin"
        
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: madcat-os-v2.0-firmware
        path: |
          .pio/build/esp32dev/firmware.bin
          .pio/build/esp32dev/firmware.elf
          .pio/build/esp32dev/partitions.bin
          .pio/build/esp32dev/bootloader.bin
          .pio/build/esp32dev/boot_app0.bin
        retention-days: 30
        
    - name: Create release package
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      run: |
        mkdir -p release
        cp .pio/build/esp32dev/firmware.bin release/
        cp .pio/build/esp32dev/partitions.bin release/
        cp .pio/build/esp32dev/bootloader.bin release/
        cp .pio/build/esp32dev/boot_app0.bin release/
        echo "MadCat OS v2.0" > release/README.txt
        echo "Version: ${{ github.ref_name }}" >> release/README.txt
        echo "Date: $(date)" >> release/README.txt
        echo "" >> release/README.txt
        echo "Funcionalidades v2.0:" >> release/README.txt
        echo "- RollJam com decodificacao RC-Switch real" >> release/README.txt
        echo "- Rolling-PWN com previsao de codigos" >> release/README.txt
        echo "- WiFi Deauth com frames 802.11 reais" >> release/README.txt
        echo "- Banco de dados Sub-GHz (24 marcas)" >> release/README.txt
        echo "- Analisador de protocolo automatico" >> release/README.txt
        echo "- BruteForce otimizado (Smart, De Bruijn, ETA)" >> release/README.txt
        echo "" >> release/README.txt
        echo "Flash command:" >> release/README.txt
        echo "esptool.py --chip esp32 --baud 921600 write_flash 0x1000 bootloader.bin 0x8000 partitions.bin 0xE000 boot_app0.bin 0x10000 firmware.bin" >> release/README.txt
        
    - name: Upload release assets
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/firmware.bin
          release/partitions.bin
          release/bootloader.bin
          release/boot_app0.bin
          release/README.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
