[platformio]
default_envs = esp32dev
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    olikraus/U8g2 @ ^2.36.18
    nrf24/RF24 @ ^1.6.1
    ELECHOUSE_CC1101_SRC_DRV

# Importante: forçar o compilador a incluir a raiz como diretório de busca
build_flags = -I.
