[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Bibliotecas necessárias para o seu código
lib_deps =
    olikraus/U8g2 @ ^2.35.4
    nrf24/RF24 @ ^1.4.5
    elechouse/ELECHOUSE_CC1101_SRC_DRV @ ^1.7.9

# Configurações extras para garantir a geração dos binários
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    
