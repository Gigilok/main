[platformio]
default_envs = esp32dev
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Força o escaneamento profundo de todas as dependências
lib_ldf_mode = deep+

lib_deps =
    olikraus/U8g2 @ ^2.36.18
    nrf24/RF24 @ ^1.6.1
    ; Esta é a forma correta de declarar a biblioteca CC1101
    smartypants/ELECHOUSE_CC1101_SRC_DRV @ ^1.7.9
    
