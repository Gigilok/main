[platformio]
default_envs = esp32dev
src_dir = .
include_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Partição maior (3MB) para o aplicativo
board_build.partitions = huge_app.csv

lib_ldf_mode = deep+
lib_archive = no

lib_deps =
    olikraus/U8g2 @ ^2.36.18
    nrf24/RF24 @ ^1.6.1
    https://github.com/LSatan/SmartRC-CC1101-Driver-Lib.git
    
