[platformio]
default_envs = esp32dev
src_dir = .
include_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_WIFI_TX_BUFFER_TYPE=1
    -DCONFIG_ESP32_WIFI_TX_BA_WIN=6
    -DCONFIG_ESP32_WIFI_TX_QUEUE_LEN=32
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
lib_ldf_mode = deep+
lib_archive = no
lib_deps =
    olikraus/U8g2 @ ^2.36.18
    nrf24/RF24 @ ^1.6.1
    https://github.com/LSatan/SmartRC-CC1101-Driver-Lib.git
    
