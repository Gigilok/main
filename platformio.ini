[platformio]
default_envs = esp32dev
src_dir = .
include_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Partição maior (3MB) para o aplicativo
board_build.partitions = huge_app.csv

; Otimizações de memória para evitar boot loop
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUHAL_LOG_DEFAULT_LEVEL=0
    -DCONFIG_BT_NIMBLE_TASK_STACK_SIZE=4096
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=4096
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=3
    -DCONFIG_BT_NIMBLE_MAX_BONDS=3
    -DCONFIG_BT_NIMBLE_MAX_CCCDS=8
    -DCONFIG_BT_NIMBLE_L2CAP_COC_MAX_NUM=0
    -DCONFIG_BT_NIMBLE_GATT_MAX_PROCS=4
    -DCONFIG_BT_NIMBLE_SM_LEGACY=1
    -DCONFIG_BT_NIMBLE_SM_SC=0
    -DCONFIG_BT_NIMBLE_DEBUG=0
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=0
    -DCONFIG_BT_NIMBLE_NVS_PERSIST=0
    -DCONFIG_BT_NIMBLE_WHITELIST_SIZE=12
    -DCONFIG_BT_NIMBLE_SVC_GAP_DEVICE_NAME_MAX_LEN=31
    -DCONFIG_BT_NIMBLE_GAP_DEVICE_NAME_MAX_LEN=31
    -DCONFIG_BT_NIMBLE_SVC_DIS_MAX_ATTRS=5
    -DCONFIG_BT_NIMBLE_SVC_BAS_MAX_ATTRS=4

; Reduzir uso de memória
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio

lib_ldf_mode = deep+
lib_archive = no

lib_deps =
    olikraus/U8g2 @ ^2.36.18
    nrf24/RF24 @ ^1.6.1
    https://github.com/LSatan/SmartRC-CC1101-Driver-Lib.git
    
